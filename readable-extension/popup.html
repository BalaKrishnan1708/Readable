<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Readable Extension</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      width: 280px;
      min-height: 160px;
      padding: 20px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo-dot {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 900;
      color: #0f172a;
    }
    .status {
      font-size: 13px;
      color: #64748b;
      font-weight: 600;
      line-height: 1.5;
    }
    .status strong {
      color: #0ea5e9;
    }
    .hint {
      margin-top: 14px;
      padding: 10px 14px;
      background: #f0f9ff;
      border: 1.5px solid #bae6fd;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      color: #0369a1;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-dot">📖</div>
    <div class="logo-text">Readable</div>
  </div>
  <p class="status">
    Select any text on a webpage, then <strong>right-click → Open in Readable</strong>.
  </p>
  <div class="hint">
    💡 Make sure <strong>localhost:5173</strong> is running before sending text.
  </div>
</body>
</html>
