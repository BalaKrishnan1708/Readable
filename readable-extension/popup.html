<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Readable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      min-height: 390px;
      font-family: "Outfit", system-ui, -apple-system, sans-serif;
      color: #0f172a;
      background: linear-gradient(135deg, #e0f2fe, #f0fdfa 48%, #fff7ed);
      padding: 14px;
    }
    .shell {
      min-height: 362px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 24px 70px -38px rgba(15, 23, 42, 0.65);
      overflow: hidden;
    }
    .hero {
      background: #0f172a;
      color: white;
      padding: 22px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .mark {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0ea5e9, #14b8a6 54%, #fb923c);
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 14px 30px -18px #38bdf8;
    }
    .name { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; }
    .tag { color: #a7f3d0; font-size: 10px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; }
    h1 {
      font-size: 28px;
      line-height: 1.04;
      letter-spacing: -0.03em;
      max-width: 260px;
    }
    .body {
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    .status {
      border: 1px solid #dbeafe;
      border-radius: 18px;
      background: #eff6ff;
      padding: 14px;
      color: #1e3a8a;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }
    .actions {
      display: grid;
      gap: 10px;
    }
    button, a {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
    }
    button:hover, a:hover { transform: translateY(-1px); }
    .primary {
      background: #0ea5e9;
      color: white;
      box-shadow: 0 5px 0 #0284c7;
    }
    .secondary {
      background: #0f172a;
      color: white;
      box-shadow: 0 5px 0 #334155;
    }
    .ghost {
      background: #f8fafc;
      color: #334155;
      border: 1px solid #e2e8f0;
    }
    .hint {
      margin-top: 2px;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }
    .ok { color: #059669; }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="brand">
        <div class="mark">R</div>
        <div>
          <div class="name">Readable</div>
          <div class="tag">Focus tools</div>
        </div>
      </div>
      <h1>Turn any page into a calmer reading surface.</h1>
    </section>

    <section class="body">
      <div class="status">
        Select text and right-click <span class="ok">Open in Readable</span>, or launch the sidebar here.
      </div>

      <div class="actions">
        <button class="primary" id="openSidebar" type="button">
          Open Sidebar <span>Ctrl</span>
        </button>
        <button class="secondary" id="openReader" type="button">
          Open Reader <span>New tab</span>
        </button>
        <a class="ghost" href="http://localhost:5173/dashboard" target="_blank" rel="noreferrer">
          Dashboard <span>localhost</span>
        </a>
      </div>

      <p class="hint">
        Keep the Readable app running on localhost:5173 for selected text handoff.
      </p>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
